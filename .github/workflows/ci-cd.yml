name: Build and deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build → push to ACR → update Container App
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag from short SHA
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR (via the same OIDC token)
        run: az acr login --name ${{ vars.AZURE_ACR_NAME }}

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image and push to ACR
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ vars.AZURE_ACR_NAME }}.azurecr.io/britedge:${{ env.IMAGE_TAG }}
            ${{ vars.AZURE_ACR_NAME }}.azurecr.io/britedge:latest

      - name: Roll out to Container App
        run: |
          az containerapp update \
            --name  ${{ vars.AZURE_CONTAINER_APP }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ vars.AZURE_ACR_NAME }}.azurecr.io/britedge:${{ env.IMAGE_TAG }}

      - name: Resolve live URL
        id: fqdn
        run: |
          FQDN=$(az containerapp show \
            --name ${{ vars.AZURE_CONTAINER_APP }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "fqdn=$FQDN" >> "$GITHUB_OUTPUT"
          echo "🌐 Live at: https://$FQDN"

      - name: Smoke test /healthz
        run: |
          FQDN=${{ steps.fqdn.outputs.fqdn }}
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://$FQDN/healthz" || true)
            if [ "$code" = "200" ]; then
              echo "✓ /healthz healthy after ${i} attempt(s)"
              exit 0
            fi
            sleep 5
          done
          echo "✗ /healthz did not return 200 within ~2.5 min"
          exit 1
